server:
  port: ${SERVER_PORT:10000}

spring:
  application:
    name: suji-service

  profiles:
    default: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 10000

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    default-schema: app
    schemas: app,doc,ai,pub,audit,job,cache

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: app

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  upload:
    dir: ${APP_UPLOAD_DIR:./uploads}

