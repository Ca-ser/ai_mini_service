############## Sa-Token 配置 ##############
sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

llm:
  api-key: ${LLM_API_KEY:}
  base-url: ${LLM_BASE_URL:https://api.deepseek.com/v1/chat/completions}
  model: ${LLM_MODEL:deepseek-chat}
